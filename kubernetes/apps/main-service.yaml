apiVersion: v1
kind: Service
metadata:
  name: main-service
spec:
  ports:
    - port: 8001
  selector:
    app: main-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-service
spec:
  selector:
    matchLabels:
      app: main-service
  template:
    metadata:
      labels:
        app: main-service
    spec:
      containers:
      - name: main-service
        image: arthurp2003/remailder-manager:latest
        ports:
        - containerPort: 8001